<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ByteIO - Cart</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@nickshanks/datastar@0.0.25/dist/datastar.umd.js"></script>
</head>
<body class="bg-gray-100 min-h-screen">
    <nav class="bg-white shadow-lg">
        <div class="container mx-auto px-4 py-4">
            <div class="flex justify-between items-center">
                <div class="flex items-center gap-4">
                    <a href="/products" class="text-indigo-600 hover:text-indigo-800">← Back to Products</a>
                    <h1 class="text-2xl font-bold text-indigo-600">Cart</h1>
                </div>
                <a href="/orders" class="text-indigo-600 hover:text-indigo-800">Orders</a>
            </div>
        </div>
    </nav>

    <div class="container mx-auto px-4 py-8">
        {% if cart_items %}
        <div class="grid md:grid-cols-2 gap-8">
            <div>
                <h2 class="text-xl font-semibold mb-4">Cart Items</h2>
                <div class="bg-white rounded-lg shadow-md p-4">
                    {% for item in cart_items %}
                    <div class="flex justify-between items-center border-b py-3">
                        <div>
                            <p class="font-medium">{{ item.name }}</p>
                            <p class="text-gray-500">₹{{ item.price }}</p>
                        </div>
                        <form action="/cart/remove" method="post">
                            <input type="hidden" name="index" value="{{ loop.index0 }}">
                            <button type="submit" class="text-red-500 hover:text-red-700">Remove</button>
                        </form>
                    </div>
                    {% endfor %}
                    <div class="flex justify-between items-center mt-4 pt-4 border-t">
                        <span class="font-bold text-lg">Total</span>
                        <span class="font-bold text-xl text-indigo-600">₹{{ total }}</span>
                    </div>
                </div>
            </div>

            <div>
                <h2 class="text-xl font-semibold mb-4">Checkout</h2>
                <form action="/checkout" method="post" class="bg-white rounded-lg shadow-md p-6">
                    <div class="mb-4">
                        <label class="block text-gray-700 mb-2">Name</label>
                        <input type="text" name="customer_name" required class="w-full border rounded-lg px-4 py-2 focus:outline-none focus:ring-2 focus:ring-indigo-500">
                    </div>
                    <div class="mb-4">
                        <label class="block text-gray-700 mb-2">Phone</label>
                        <input 
                            type="tel" 
                            name="phone" 
                            required 
                            pattern="[6-9][0-9]{9}"
                            placeholder="10-digit mobile number"
                            title="Enter 10-digit Indian mobile number"
                            class="w-full border rounded-lg px-4 py-2 focus:outline-none focus:ring-2 focus:ring-indigo-500"
                        >
                    </div>
                    <div class="mb-6">
                        <label class="block text-gray-700 mb-2">Payment Mode</label>
                        <div class="flex gap-4">
                            <label class="flex items-center border rounded-lg p-3 cursor-pointer hover:bg-gray-50 flex-1">
                                <input type="radio" name="payment_mode" value="COD" class="mr-2" required>
                                <span class="font-medium">COD (Cash on Delivery)</span>
                            </label>
                            <label class="flex items-center border rounded-lg p-3 cursor-pointer hover:bg-gray-50 flex-1">
                                <input type="radio" name="payment_mode" value="CARD" class="mr-2">
                                <span class="font-medium">Card</span>
                            </label>
                        </div>
                    </div>
                    <button type="submit" class="w-full bg-indigo-600 text-white py-3 rounded-lg hover:bg-indigo-700 font-semibold">
                        Place Order
                    </button>
                </form>
            </div>
        </div>
        {% else %}
        <div class="text-center py-12">
            <p class="text-gray-500 text-lg">Your cart is empty</p>
            <a href="/products" class="inline-block mt-4 bg-indigo-600 text-white px-6 py-2 rounded-lg hover:bg-indigo-700">Shop Now</a>
        </div>
        {% endif %}
    </div>
</body>
</html>
